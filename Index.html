<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="5 Pillars">
    <title>5 Pillars Daily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            margin-top: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setup-section {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .date-picker-group {
            display: flex;
            gap: 10px;
        }

        .date-picker-group input {
            flex: 1;
        }

        .day-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .day-summary h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .summary-item {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
        }

        .summary-item strong {
            display: block;
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 3px;
        }

        .hour-block {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        .hour-block.peak {
            border-left-color: #4caf50;
            background: #f1f8f4;
        }

        .hour-block.challenging {
            border-left-color: #ff9800;
            background: #fff8f1;
        }

        .hour-time {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .hour-block.peak .hour-time {
            color: #4caf50;
        }

        .hour-block.challenging .hour-time {
            color: #ff9800;
        }

        .hour-details {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        .element-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .element-fire {
            background: #ffebee;
            color: #d32f2f;
        }

        .element-wood {
            background: #e8f5e9;
            color: #388e3c;
        }

        .element-water {
            background: #e3f2fd;
            color: #1565c0;
        }

        .element-earth {
            background: #fff3e0;
            color: #e65100;
        }

        .element-metal {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .toggle-btn {
            background: #e0e0e0;
            color: #333;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 8px;
            margin-top: 10px;
            width: 100%;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 14px;
        }

        .error {
            background: #ffebee;
            color: #d32f2f;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .success {
            background: #e8f5e9;
            color: #388e3c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .settings-toggle {
            text-align: center;
            margin-bottom: 15px;
        }

        .settings-toggle button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            width: auto;
        }

        .chart-info {
            background: #f0f4ff;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .chart-info strong {
            color: #667eea;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 24px;
            }
            
            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 5 Pillars Daily</h1>
            <p>Your Daily Energy Guide</p>
        </div>

        <div class="card">
            <div class="settings-toggle">
                <button class="btn-primary" onclick="toggleSetup()">⚙️ Setup Chart</button>
            </div>

            <div id="setupSection" class="setup-section hidden">
                <div class="section-title">📋 Birth Chart Setup</div>
                
                <div class="form-group">
                    <label>Birth Date</label>
                    <input type="date" id="birthDate" placeholder="YYYY-MM-DD">
                </div>

                <div class="form-group">
                    <label>Birth Time</label>
                    <input type="time" id="birthTime" placeholder="HH:MM">
                </div>

                <div class="form-group">
                    <label>Day Master (元)</label>
                    <select id="dayMaster">
                        <option value="">Select Day Master...</option>
                        <option value="Yang Metal">Yang Metal (陽金)</option>
                        <option value="Yin Metal">Yin Metal (陰金)</option>
                        <option value="Yang Water">Yang Water (陽水)</option>
                        <option value="Yin Water">Yin Water (陰水)</option>
                        <option value="Yang Wood">Yang Wood (陽木)</option>
                        <option value="Yin Wood">Yin Wood (陰木)</option>
                        <option value="Yang Fire">Yang Fire (陽火)</option>
                        <option value="Yin Fire">Yin Fire (陰火)</option>
                        <option value="Yang Earth">Yang Earth (陽土)</option>
                        <option value="Yin Earth">Yin Earth (陰土)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Chart Strength</label>
                    <select id="chartStrength">
                        <option value="">Select...</option>
                        <option value="Strong">Strong</option>
                        <option value="Weak">Weak</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Lucky Elements (select all)</label>
                    <div>
                        <label style="display: flex; gap: 8px; margin-bottom: 8px; font-weight: normal;">
                            <input type="checkbox" class="lucky-element" value="Fire"> 🔥 Fire
                        </label>
                        <label style="display: flex; gap: 8px; margin-bottom: 8px; font-weight: normal;">
                            <input type="checkbox" class="lucky-element" value="Wood"> 🌿 Wood
                        </label>
                        <label style="display: flex; gap: 8px; margin-bottom: 8px; font-weight: normal;">
                            <input type="checkbox" class="lucky-element" value="Water"> 💧 Water
                        </label>
                        <label style="display: flex; gap: 8px; margin-bottom: 8px; font-weight: normal;">
                            <input type="checkbox" class="lucky-element" value="Earth"> 🏜️ Earth
                        </label>
                        <label style="display: flex; gap: 8px; font-weight: normal;">
                            <input type="checkbox" class="lucky-element" value="Metal"> ⚙️ Metal
                        </label>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="saveChart()">Save Chart</button>
                    <button class="btn-secondary" onclick="toggleSetup()">Done</button>
                </div>
            </div>

            <div id="chartDisplay" class="hidden">
                <div class="chart-info" id="chartInfo"></div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">📅 Select Date</div>
            <div class="date-picker-group">
                <input type="date" id="forecastDate">
                <button class="btn-primary" onclick="getForecast()">Get Forecast</button>
            </div>
        </div>

        <div id="forecastSection" class="hidden">
            <div class="card">
                <div id="daySummary"></div>
            </div>

            <div class="card">
                <div class="section-title">⏰ Hourly Breakdown (5am - 2am)</div>
                <div id="hoursContainer"></div>
                <button class="toggle-btn" onclick="toggleExtendedHours()">📖 Show 2am - 5am</button>
                <div id="extendedHours" class="hidden" style="margin-top: 15px; padding-top: 15px; border-top: 2px solid #e0e0e0;">
                    <div id="extendedHoursContainer"></div>
                </div>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script>
        // Initialize with today's date
        document.getElementById('forecastDate').valueAsDate = new Date();

        // Set default chart data from Four Pillars (Emily's chart)
        const DEFAULT_CHART = {
            birthDate: '1988-12-21',
            birthTime: '08:25',
            dayMaster: 'Yang Metal',
            chartStrength: 'Strong',
            luckyElements: ['Fire', 'Wood']
        };

        // Load saved chart (or use default)
        loadChart();

        function toggleSetup() {
            const setupSection = document.getElementById('setupSection');
            setupSection.classList.toggle('hidden');
        }

        function loadChart() {
            let chart = JSON.parse(localStorage.getItem('birthChart'));
            
            // If no saved chart, use default and save it
            if (!chart) {
                chart = DEFAULT_CHART;
                localStorage.setItem('birthChart', JSON.stringify(chart));
            }
            
            document.getElementById('birthDate').value = chart.birthDate;
            document.getElementById('birthTime').value = chart.birthTime;
            document.getElementById('dayMaster').value = chart.dayMaster;
            document.getElementById('chartStrength').value = chart.chartStrength;
            
            // Load lucky elements
            document.querySelectorAll('.lucky-element').forEach(el => {
                el.checked = chart.luckyElements && chart.luckyElements.includes(el.value);
            });

            displayChartInfo(chart);
        }

        function saveChart() {
            const luckyElements = Array.from(document.querySelectorAll('.lucky-element:checked'))
                .map(el => el.value);

            const chart = {
                birthDate: document.getElementById('birthDate').value,
                birthTime: document.getElementById('birthTime').value,
                dayMaster: document.getElementById('dayMaster').value,
                chartStrength: document.getElementById('chartStrength').value,
                luckyElements: luckyElements
            };

            if (!chart.birthDate || !chart.dayMaster || !chart.chartStrength) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            localStorage.setItem('birthChart', JSON.stringify(chart));
            showMessage('Birth chart saved!', 'success');
            displayChartInfo(chart);
            setTimeout(() => toggleSetup(), 1000);
        }

        function displayChartInfo(chart) {
            const chartDisplay = document.getElementById('chartDisplay');
            const chartInfo = document.getElementById('chartInfo');
            
            if (chart.birthDate) {
                chartInfo.innerHTML = `
                    <strong>📊 Your Chart</strong><br>
                    Born: ${chart.birthDate} at ${chart.birthTime}<br>
                    Day Master: ${chart.dayMaster}<br>
                    Strength: ${chart.chartStrength}<br>
                    Lucky Elements: ${chart.luckyElements.join(', ')}
                `;
                chartDisplay.classList.remove('hidden');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
            setTimeout(() => messageDiv.innerHTML = '', 3000);
        }

        async function getForecast() {
            const chart = JSON.parse(localStorage.getItem('birthChart')) || DEFAULT_CHART;
            
            const forecastDate = document.getElementById('forecastDate').value;
            if (!forecastDate) {
                showMessage('Please select a date', 'error');
                return;
            }

            showMessage('Loading forecast...', 'loading');
            
            try {
                const stemBranch = await getDayStemBranch(forecastDate);
                if (!stemBranch) {
                    showMessage('Could not fetch calendar data. Try another date.', 'error');
                    return;
                }

                generateForecast(forecastDate, stemBranch, chart);
                document.getElementById('forecastSection').classList.remove('hidden');
                showMessage('Forecast ready!', 'success');
            } catch (error) {
                showMessage('Error loading forecast: ' + error.message, 'error');
            }
        }

        async function getDayStemBranch(dateStr) {
            // Using lunar calendar API
            try {
                const date = new Date(dateStr);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');

                // Using a free Chinese calendar API
                const response = await fetch(
                    `https://api.istellar.com.cn/v1/calendar?date=${year}-${month}-${day}`
                );
                
                if (!response.ok) {
                    // Fallback API
                    return getDefaultStemBranch(dateStr);
                }

                const data = await response.json();
                // Extract stem-branch from response (varies by API)
                return data.celestialStem ? data.celestialStem + data.celestialBranch : null;
            } catch (error) {
                console.log('API error, using calculation:', error);
                return getDefaultStemBranch(dateStr);
            }
        }

        function getDefaultStemBranch(dateStr) {
            // Simplified calculation based on Gregorian to stem-branch
            // This provides a reasonable approximation
            const stems = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
            const branches = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
            
            const date = new Date(dateStr);
            const dayNum = Math.floor((date - new Date(2000, 0, 1)) / (1000 * 60 * 60 * 24));
            
            const stem = stems[dayNum % 10];
            const branch = branches[dayNum % 12];
            
            return stem + branch;
        }

        function generateForecast(dateStr, dayStemBranch, chart) {
            const date = new Date(dateStr);
            const dayName = date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

            // Generate day summary
            const daySummaryHTML = `
                <h3>📍 ${dayName}</h3>
                <div class="summary-grid">
                    <div class="summary-item">
                        <strong>Day Stem-Branch</strong>
                        ${dayStemBranch}
                    </div>
                    <div class="summary-item">
                        <strong>Your Day Master</strong>
                        ${chart.dayMaster}
                    </div>
                </div>
            `;
            document.getElementById('daySummary').innerHTML = daySummaryHTML;

            // Generate hourly breakdown
            const hours = [
                { time: '5:00 - 7:00 AM', hour: 5, animal: '寅 Tiger', element: 'Wood' },
                { time: '7:00 - 9:00 AM', hour: 7, animal: '卯 Rabbit', element: 'Wood' },
                { time: '9:00 - 11:00 AM', hour: 9, animal: '巳 Snake', element: 'Fire' },
                { time: '11:00 AM - 1:00 PM', hour: 11, animal: '午 Horse', element: 'Fire' },
                { time: '1:00 - 3:00 PM', hour: 13, animal: '未 Sheep', element: 'Earth' },
                { time: '3:00 - 5:00 PM', hour: 15, animal: '申 Monkey', element: 'Metal' },
                { time: '5:00 - 7:00 PM', hour: 17, animal: '酉 Rooster', element: 'Metal' },
                { time: '7:00 - 9:00 PM', hour: 19, animal: '戌 Dog', element: 'Earth' },
                { time: '9:00 - 11:00 PM', hour: 21, animal: '亥 Pig', element: 'Water' },
                { time: '11:00 PM - 1:00 AM', hour: 23, animal: '子 Rat', element: 'Water' },
                { time: '1:00 - 3:00 AM', hour: 1, animal: '丑 Ox', element: 'Earth' },
                { time: '3:00 - 5:00 AM', hour: 3, animal: '寅 Tiger', element: 'Wood' }
            ];

            // Extended hours (2am - 5am)
            const extendedHours = [
                { time: '2:00 - 3:00 AM', hour: 2, animal: '丑 Ox', element: 'Earth' },
                { time: '3:00 - 5:00 AM', hour: 3, animal: '寅 Tiger', element: 'Wood' }
            ];

            const luckyElements = chart.luckyElements || [];
            const hoursHTML = hours.slice(0, 10).map(h => generateHourBlock(h, luckyElements, chart)).join('');
            const extendedHTML = hours.slice(10).concat(extendedHours).map(h => generateHourBlock(h, luckyElements, chart)).join('');

            document.getElementById('hoursContainer').innerHTML = hoursHTML;
            document.getElementById('extendedHoursContainer').innerHTML = extendedHTML;
        }

        function generateHourBlock(hour, luckyElements, chart) {
            let quality = 'neutral';
            let qualityText = '◆ Neutral energy';
            let className = '';

            if (luckyElements.includes(hour.element)) {
                quality = 'peak';
                qualityText = '★ Peak energy - optimal for important tasks';
                className = 'peak';
            } else if (hour.element === 'Water' && chart.chartStrength === 'Strong') {
                quality = 'challenging';
                qualityText = '⚠ Challenging - requires caution';
                className = 'challenging';
            }

            const elementClass = `element-${hour.element.toLowerCase()}`;
            
            return `
                <div class="hour-block ${className}">
                    <div class="hour-time">${hour.time}</div>
                    <div class="hour-details">
                        <div style="margin-bottom: 5px;">
                            <span class="element-tag ${elementClass}">${hour.element}</span>
                            <span class="element-tag">${hour.animal}</span>
                        </div>
                        <div>${qualityText}</div>
                    </div>
                </div>
            `;
        }

        function toggleExtendedHours() {
            document.getElementById('extendedHours').classList.toggle('hidden');
        }
    </script>
</body>
</html>
